<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Optical Ecosystem · Investor Dashboard</title>
<style>
:root {
  --bg: #fafaf7;
  --bg-card: #ffffff;
  --bg-elevated: #f5f3ee;
  --bg-soft: #faf9f4;
  --border: #e8e5dd;
  --border-soft: #f0ede5;
  --text: #1a1a18;
  --text-2: #5a594f;
  --text-3: #8a8780;
  --accent: #d97706;
  --accent-soft: #fef3e2;
  --accent-deep: #92400e;
  --blue: #1e40af;
  --blue-soft: #e0e7ff;
  --green: #15803d;
  --green-soft: #dcfce7;
  --red: #b91c1c;
  --red-soft: #fee2e2;
  --purple: #6d28d9;
  --purple-soft: #ede9fe;
  --teal: #0f766e;
  --teal-soft: #ccfbf1;
  --serif: 'Charter', 'Iowan Old Style', Georgia, serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: var(--accent-deep); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; }

/* ============ TOP BAR ============ */
.topbar {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 12px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.brand-row { display: flex; align-items: center; gap: 14px; }
.brand-clickable {
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 0;
  font-family: inherit;
  text-align: left;
  border-radius: 8px;
  margin: -4px;
  padding: 4px;
  transition: background 0.15s;
}
.brand-clickable:hover { background: rgba(217, 119, 6, 0.06); }
.brand-mark {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  color: white;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
}
.brand-text { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; font-family: var(--font-display); }
.brand-sub { font-size: 12px; color: var(--text-3); }

/* Ecosystem switcher */
.ecosystem-switcher {
  display: flex;
  gap: 2px;
  background: var(--bg-elevated);
  padding: 3px;
  border-radius: 8px;
  margin-left: 8px;
}
.eco-tab {
  padding: 6px 14px;
  border: none;
  background: transparent;
  border-radius: 6px;
  font-weight: 600;
  font-size: 12px;
  color: var(--text-3);
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.eco-tab:hover { color: var(--text); }
.eco-tab.active {
  background: var(--bg-card);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}
.eco-tab.active[data-eco="optical"] { color: var(--accent-deep); }
.eco-tab.active[data-eco="semicap"] { color: var(--blue); }

/* Update prices button */
.update-prices-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
}
.update-prices-btn:hover:not(:disabled) {
  background: var(--bg-elevated);
  border-color: var(--text-3);
  color: var(--text);
}
.update-prices-btn:disabled { opacity: 0.6; cursor: wait; }
.update-prices-btn.loading .update-icon { animation: spin 1s linear infinite; }
.update-prices-btn.success { border-color: var(--green); color: var(--green); }
.update-prices-btn.error { border-color: var(--red); color: var(--red); }
.update-icon {
  display: inline-block;
  width: 13px;
  height: 13px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8'/><path d='M21 3v5h-5'/><path d='M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16'/><path d='M3 21v-5h5'/></svg>");
  background-size: contain;
  background-repeat: no-repeat;
}
@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
.update-timestamp {
  font-size: 11px;
  color: var(--text-3);
  margin-left: 4px;
  font-style: italic;
}

/* Home nav button */
.nav-home {
  background: rgba(217, 119, 6, 0.05);
  border: 1px solid rgba(217, 119, 6, 0.15);
  margin-bottom: 12px;
}
.nav-home:hover { background: rgba(217, 119, 6, 0.1); }
.nav-home.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.nav-home.active .nav-num { color: white; }

/* Ticker selector */
.ticker-pills {
  display: flex;
  gap: 4px;
  background: var(--bg-elevated);
  padding: 4px;
  border-radius: 8px;
  overflow-x: auto;
}
.ticker-pill {
  padding: 6px 12px;
  border: none;
  background: transparent;
  border-radius: 6px;
  font-weight: 600;
  font-size: 13px;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  font-family: inherit;
}
.ticker-pill:hover { background: var(--bg-card); color: var(--text); }
.ticker-pill.active {
  background: var(--bg-card);
  color: var(--accent-deep);
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}
.ticker-pill.active.eco-semicap {
  color: var(--blue);
}
.ticker-pill .pill-name { font-size: 11px; color: var(--text-3); margin-left: 6px; font-weight: 400; }
.ticker-pill.active .pill-name { color: var(--text-2); }

.quote-strip {
  display: flex;
  gap: 20px;
  align-items: center;
}
.quote-cell { text-align: right; }
.quote-cell-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
.quote-cell-value { font-size: 14px; font-weight: 600; }
.quote-cell-value.up { color: var(--green); }
.quote-cell-value.down { color: var(--red); }

/* ============ LAYOUT ============ */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  max-width: 1500px;
  margin: 0 auto;
}
.sidebar {
  padding: 24px 12px;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
}
.main {
  padding: 32px 44px 80px;
  background: var(--bg-card);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  min-width: 0;
  min-height: calc(100vh - 60px);
}
@media (max-width: 1024px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: relative; height: auto; padding: 12px 16px; border-bottom: 1px solid var(--border); top: 0; background: var(--bg-card); }
  .sidebar-nav { display: flex; gap: 2px; overflow-x: auto; padding-bottom: 4px; }
  .nav-section-label { display: none; }
  .main { padding: 24px 20px 60px; border: none; }
  .topbar { padding: 10px 16px; flex-wrap: wrap; }
  .quote-strip { gap: 14px; }
  .ticker-pills { width: 100%; order: 3; margin-top: 8px; }
}

/* ============ SIDEBAR ============ */
.nav-section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);
  padding: 8px 12px 4px;
  font-weight: 600;
  margin-top: 12px;
}
.nav-section-label:first-child { margin-top: 0; }
.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  font-size: 13px;
  color: var(--text-2);
  border: none;
  background: transparent;
  text-align: left;
  width: 100%;
  border-radius: 6px;
  margin-bottom: 1px;
  white-space: nowrap;
  transition: all 0.12s;
  font-family: inherit;
}
.nav-link:hover { background: var(--bg-elevated); color: var(--text); }
.nav-link.active { background: var(--accent-soft); color: var(--accent-deep); font-weight: 600; }
.nav-num {
  font-size: 11px;
  color: var(--text-3);
  width: 18px;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.nav-link.active .nav-num { color: var(--accent); }

/* ============ TYPOGRAPHY ============ */
.eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 10px;
}
h1.page-title {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin-bottom: 12px;
  color: var(--text);
}
h2.subsection-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 28px 0 14px;
  color: var(--text);
}
h3.minor-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin: 20px 0 10px;
}
.lead-paragraph {
  font-size: 16px;
  line-height: 1.65;
  color: var(--text-2);
  margin-bottom: 24px;
  max-width: 720px;
}
p { color: var(--text-2); margin-bottom: 12px; }
p strong { color: var(--text); font-weight: 600; }

/* ============ SECTIONS ============ */
.section { display: none; }
.section.active { display: block; animation: slideUp 0.2s ease-out; }
@keyframes slideUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.section-header {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

/* ============ STATS ============ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
}
.stat-card-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600; }
.stat-card-value { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
.stat-card-sub { font-size: 12px; color: var(--text-2); margin-top: 4px; }
.stat-card-sub.up { color: var(--green); font-weight: 500; }
.stat-card-sub.down { color: var(--red); font-weight: 500; }
.hero-stat {
  background: linear-gradient(135deg, var(--accent-soft) 0%, #fef9ed 100%);
  border-color: #f4d9a8;
  grid-column: span 2;
}
.hero-stat .stat-card-value { color: var(--accent-deep); font-size: 32px; }
@media (max-width: 600px) { .hero-stat { grid-column: span 1; } }

/* ============ CARDS ============ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px;
  margin-bottom: 16px;
}
.card-soft { background: var(--bg-soft); border-color: var(--border-soft); }
.card-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.card-title { font-size: 15px; font-weight: 600; color: var(--text); }
.card-meta { font-size: 12px; color: var(--text-3); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 800px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* ============ TABLES ============ */
.table-clean { width: 100%; border-collapse: collapse; font-size: 13px; }
.table-clean th { text-align: left; padding: 10px 12px; font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; border-bottom: 1px solid var(--border); background: var(--bg-soft); }
.table-clean td { padding: 11px 12px; border-bottom: 1px solid var(--border-soft); color: var(--text); font-variant-numeric: tabular-nums; }
.table-clean tbody tr:hover { background: var(--bg-soft); }
.table-clean tbody tr:last-child td { border-bottom: none; }
.table-clean td.num, .table-clean th.num { text-align: right; }
.table-clean td.label { color: var(--text-2); }
.table-clean tr.highlight { background: var(--accent-soft) !important; }
.table-clean tr.highlight td { color: var(--accent-deep); font-weight: 600; }
.table-clean .ticker-link {
  background: none;
  border: none;
  color: var(--accent-deep);
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  font-size: inherit;
  padding: 0;
  border-bottom: 1px dashed var(--accent);
}
.table-clean .ticker-link:hover { background: var(--accent-soft); border-radius: 3px; padding: 0 4px; }

.table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }

/* ============ BADGES ============ */
.badge { display: inline-flex; align-items: center; padding: 3px 9px; font-size: 11px; font-weight: 600; border-radius: 999px; }
.badge-success { background: var(--green-soft); color: var(--green); }
.badge-warning { background: var(--accent-soft); color: var(--accent-deep); }
.badge-danger { background: var(--red-soft); color: var(--red); }
.badge-info { background: var(--blue-soft); color: var(--blue); }
.badge-purple { background: var(--purple-soft); color: var(--purple); }
.badge-teal { background: var(--teal-soft); color: var(--teal); }
.badge-neutral { background: var(--bg-elevated); color: var(--text-2); }

/* ============ CHARTS ============ */
.chart-wrap { position: relative; width: 100%; height: 260px; margin: 4px 0; }
.chart-wrap-tall { height: 340px; }
.chart-wrap-short { height: 200px; }

/* ============ SVG ============ */
svg .lbl-title { font-family: var(--sans); font-size: 12px; font-weight: 600; fill: var(--text); }
svg .lbl-sub { font-family: var(--sans); font-size: 10px; fill: var(--text-2); }
svg .lbl-tier { font-family: var(--sans); font-size: 10px; font-weight: 600; fill: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
svg .arrow-line { stroke: #c5c2b8; stroke-width: 1.5; fill: none; }
svg .arrow-line.thick { stroke-width: 2.5; stroke: var(--accent); }
svg .clickable-node { cursor: pointer; transition: opacity 0.15s; }
svg .clickable-node:hover { opacity: 0.75; }

svg .grp-blue rect { fill: var(--blue-soft); stroke: var(--blue); stroke-width: 1; }
svg .grp-blue .lbl-title { fill: var(--blue); }
svg .grp-accent rect { fill: var(--accent-soft); stroke: var(--accent); stroke-width: 1; }
svg .grp-accent .lbl-title { fill: var(--accent-deep); }
svg .grp-green rect { fill: var(--green-soft); stroke: var(--green); stroke-width: 1; }
svg .grp-green .lbl-title { fill: var(--green); }
svg .grp-purple rect { fill: var(--purple-soft); stroke: var(--purple); stroke-width: 1; }
svg .grp-purple .lbl-title { fill: var(--purple); }
svg .grp-teal rect { fill: var(--teal-soft); stroke: var(--teal); stroke-width: 1; }
svg .grp-teal .lbl-title { fill: var(--teal); }
svg .grp-neutral rect { fill: var(--bg-elevated); stroke: #c5c2b8; stroke-width: 1; }
svg .grp-neutral .lbl-title { fill: var(--text); }
svg .grp-frame rect { fill: rgba(217, 119, 6, 0.04); stroke: var(--accent); stroke-width: 1; stroke-dasharray: 4 3; }

/* ============ TIMELINE ============ */
.timeline { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 20px 0; }
@media (max-width: 900px) { .timeline { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 500px) { .timeline { grid-template-columns: repeat(2, 1fr); } }
.timeline-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; border-top: 3px solid var(--accent); }
.timeline-year { font-size: 11px; color: var(--accent-deep); font-weight: 700; letter-spacing: 0.04em; margin-bottom: 4px; }
.timeline-event { font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 4px; }
.timeline-desc { font-size: 11px; color: var(--text-2); line-height: 1.45; }

/* ============ LISTS ============ */
ul.clean-list { list-style: none; padding: 0; }
ul.clean-list li { font-size: 13px; padding: 9px 0 9px 24px; border-bottom: 1px solid var(--border-soft); position: relative; line-height: 1.5; color: var(--text); }
ul.clean-list li:last-child { border-bottom: none; }
ul.clean-list li::before { content: ''; position: absolute; left: 8px; top: 16px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
ul.clean-list.green li::before { background: var(--green); }
ul.clean-list.red li::before { background: var(--red); }
ul.clean-list li strong { color: var(--text); font-weight: 600; }

/* ============ CALLOUTS ============ */
.callout { padding: 16px 20px; border-radius: 10px; margin: 18px 0; border-left: 3px solid; }
.callout-info { background: var(--blue-soft); border-color: var(--blue); }
.callout-warning { background: var(--accent-soft); border-color: var(--accent); }
.callout-success { background: var(--green-soft); border-color: var(--green); }
.callout-danger { background: var(--red-soft); border-color: var(--red); }
.callout p { color: var(--text); margin: 0; font-size: 14px; }

/* ============ KEY POINTS ============ */
.key-points-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
.key-point { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
.key-point-icon { width: 28px; height: 28px; border-radius: 7px; background: var(--accent-soft); color: var(--accent-deep); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 10px; font-weight: 700; font-size: 13px; }
.key-point-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.key-point-desc { font-size: 12px; color: var(--text-2); line-height: 1.5; }

/* ============ PROGRESS ============ */
.progress-bar { display: inline-block; width: 70px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; vertical-align: middle; margin-right: 8px; }
.progress-fill { height: 100%; background: var(--accent); }
.progress-fill.green { background: var(--green); }
.progress-fill.red { background: var(--red); }
.progress-fill.blue { background: var(--blue); }

/* ============ MAP ============ */
.map-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
.map-card svg { display: block; width: 100%; height: auto; }
.map-country { fill: var(--bg-elevated); stroke: var(--border); stroke-width: 0.6; }
.map-pin { fill: var(--accent); stroke: white; stroke-width: 2; cursor: pointer; }
.map-pin-fab { fill: var(--green); }
.map-pin-rd { fill: var(--blue); }
.map-pin-mfg { fill: var(--accent); }
.map-pin-label { font-family: var(--sans); font-size: 10px; fill: var(--text); font-weight: 600; }
.map-pin-label-sub { font-family: var(--sans); font-size: 9px; fill: var(--text-2); }
.map-legend { display: flex; gap: 20px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-soft); font-size: 12px; color: var(--text-2); flex-wrap: wrap; }
.map-legend-item { display: flex; align-items: center; gap: 6px; }
.map-legend-dot { width: 9px; height: 9px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 1px var(--border); }

/* ============ SCENARIO CARDS ============ */
.scenario-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 18px 0; }
@media (max-width: 700px) { .scenario-grid { grid-template-columns: 1fr; } }
.scenario { border-radius: 10px; padding: 18px; border: 1px solid; }
.scenario-bear { background: var(--red-soft); border-color: #fca5a5; }
.scenario-base { background: var(--accent-soft); border-color: #f4d9a8; }
.scenario-bull { background: var(--green-soft); border-color: #86efac; }
.scenario-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-bottom: 6px; }
.scenario-bear .scenario-label { color: var(--red); }
.scenario-base .scenario-label { color: var(--accent-deep); }
.scenario-bull .scenario-label { color: var(--green); }
.scenario-price { font-family: var(--serif); font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
.scenario-vs { font-size: 12px; color: var(--text-2); margin-bottom: 12px; }
.scenario-rows { font-size: 12px; }
.scenario-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.07); }
.scenario-row:last-child { border-bottom: none; }
.scenario-row span:first-child { color: var(--text-2); }
.scenario-row span:last-child { font-weight: 600; }

/* ============ ANALYST RATINGS ============ */
.analyst-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 800px) { .analyst-grid { grid-template-columns: 1fr; } }
.analyst-summary {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px;
}
.consensus-rating {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 18px;
}
.rating-badge {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  padding: 12px 20px;
  border-radius: 10px;
  background: var(--green-soft);
  color: var(--green);
  letter-spacing: -0.02em;
}
.rating-meta { font-size: 13px; color: var(--text-2); }
.rating-distribution {
  display: flex;
  gap: 4px;
  margin-bottom: 6px;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
}
.rating-bar {
  height: 100%;
}
.rating-bar.buy { background: var(--green); }
.rating-bar.hold { background: var(--text-3); }
.rating-bar.sell { background: var(--red); }
.rating-distribution-labels {
  display: flex;
  gap: 12px;
  font-size: 11px;
  color: var(--text-2);
}
.rating-distribution-labels strong { color: var(--text); }

/* Price target distribution */
.target-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-soft);
  font-size: 13px;
}
.target-row:last-child { border-bottom: none; }
.target-firm { width: 130px; color: var(--text); font-weight: 500; }
.target-rating { width: 60px; }
.target-rating .badge { font-size: 10px; padding: 2px 7px; }
.target-price { width: 80px; text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
.target-bar-wrap { flex: 1; position: relative; height: 4px; background: var(--border); border-radius: 2px; min-width: 60px; }
.target-bar { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); border-radius: 2px; }
.target-vs { width: 60px; text-align: right; font-size: 12px; }

/* Rating change feed */
.rating-change-feed { font-size: 13px; }
.rating-change {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-soft);
  align-items: center;
}
.rating-change:last-child { border-bottom: none; }
.rating-change-date { font-size: 11px; color: var(--text-3); font-weight: 500; }
.rating-change-text { font-size: 13px; line-height: 1.4; }
.rating-change-text strong { color: var(--text); }
.rating-change-action {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.rating-change-action.raise { background: var(--green-soft); color: var(--green); }
.rating-change-action.lower { background: var(--red-soft); color: var(--red); }
.rating-change-action.init { background: var(--blue-soft); color: var(--blue); }
.rating-change-action.maintain { background: var(--bg-elevated); color: var(--text-2); }

/* ============ SOTP ============ */
.sotp-table { width: 100%; }
.sotp-table th, .sotp-table td { padding: 12px 14px; }
.sotp-segment-name { font-weight: 600; color: var(--text); }
.sotp-segment-desc { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.sotp-controls {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  background: var(--bg-soft);
  padding: 14px;
  border-radius: 8px;
  margin-bottom: 16px;
}
.sotp-control-label { font-size: 12px; color: var(--text-2); font-weight: 600; }
.sotp-input {
  width: 70px;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 13px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  background: var(--bg-card);
}
.sotp-result-card {
  background: linear-gradient(135deg, var(--accent-soft) 0%, #fef9ed 100%);
  border: 1px solid #f4d9a8;
  border-radius: 10px;
  padding: 20px 24px;
  margin: 18px 0;
}
.sotp-result-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 6px 0;
}
.sotp-result-row.divider { border-top: 1px solid #f4d9a8; padding-top: 12px; margin-top: 8px; }
.sotp-result-row.total { border-top: 2px solid var(--accent); padding-top: 14px; margin-top: 10px; }
.sotp-result-row span:first-child { color: var(--text-2); font-size: 14px; }
.sotp-result-row span:last-child { font-weight: 600; font-variant-numeric: tabular-nums; font-size: 14px; }
.sotp-result-row.total span { font-size: 18px; color: var(--accent-deep); font-weight: 700; }

/* ============ SUPPLY CHAIN INTERACTIVE ============ */
.flow-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 16px;
}
.flow-detail-panel {
  background: var(--accent-soft);
  border: 1px solid #f4d9a8;
  border-radius: 10px;
  padding: 16px 20px;
  margin-top: 14px;
  font-size: 13px;
  display: none;
}
.flow-detail-panel.active { display: block; animation: slideUp 0.2s ease-out; }
.flow-detail-title { font-size: 14px; font-weight: 600; color: var(--accent-deep); margin-bottom: 6px; }
.flow-detail-body { color: var(--text); line-height: 1.6; }
.flow-detail-body strong { color: var(--text); }

/* ============ TRADING OPPS ============ */
.opp-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 12px;
  border-left: 4px solid var(--accent);
}
.opp-card.long { border-left-color: var(--green); }
.opp-card.short { border-left-color: var(--red); }
.opp-card.pair { border-left-color: var(--blue); }
.opp-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
.opp-direction {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
}
.opp-direction.long { background: var(--green-soft); color: var(--green); }
.opp-direction.short { background: var(--red-soft); color: var(--red); }
.opp-direction.pair { background: var(--blue-soft); color: var(--blue); }
.opp-title { font-size: 15px; font-weight: 600; color: var(--text); }
.opp-thesis { font-size: 13px; color: var(--text-2); margin-bottom: 10px; line-height: 1.5; }
.opp-metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border-soft);
}
.opp-metric-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.opp-metric-value { font-size: 13px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }

/* ============ PEER MULTIPLE COMPARISON ============ */
.multiple-compare-row {
  display: grid;
  grid-template-columns: 100px 1fr 80px;
  gap: 12px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-soft);
  font-size: 13px;
}
.multiple-compare-row:last-child { border-bottom: none; }
.multiple-firm { font-weight: 600; }
.multiple-firm-sub { font-size: 11px; color: var(--text-3); font-weight: 400; margin-left: 6px; }
.multiple-bar-wrap { position: relative; height: 8px; background: var(--bg-elevated); border-radius: 4px; }
.multiple-bar { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); border-radius: 4px; }
.multiple-bar.median-marker { background: var(--text); width: 2px; }
.multiple-value { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }

/* ============ EXPLAINER (what it does) ============ */
.explainer-card {
  background: linear-gradient(180deg, var(--bg-soft) 0%, var(--bg-card) 100%);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 16px;
}
.explainer-oneliner {
  font-family: var(--serif);
  font-size: 19px;
  line-height: 1.4;
  color: var(--text);
  margin-bottom: 14px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.explainer-body {
  font-size: 14.5px;
  line-height: 1.7;
  color: var(--text-2);
}
.product-list {
  display: flex;
  flex-direction: column;
  border-top: 1px solid var(--border-soft);
}
.product-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 24px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border-soft);
  align-items: baseline;
}
.product-row:last-child { border-bottom: none; }
@media (max-width: 700px) {
  .product-row { grid-template-columns: 1fr; gap: 4px; }
}
.product-name {
  font-weight: 600;
  color: var(--text);
  font-size: 14px;
}
.product-what {
  color: var(--text-2);
  font-size: 13.5px;
  line-height: 1.55;
}

/* ============ HOME PAGE ============ */
.home-hero {
  text-align: center;
  padding: 30px 20px 50px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
}
.home-hero-eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent-deep);
  font-weight: 600;
  margin-bottom: 14px;
}
.home-hero-title {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 18px;
}
@media (max-width: 700px) { .home-hero-title { font-size: 32px; } }
.home-hero-lead {
  font-size: 17px;
  line-height: 1.6;
  color: var(--text-2);
  max-width: 640px;
  margin: 0 auto 28px;
}
.home-hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}
.home-hero-stat-num {
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 700;
  color: var(--accent-deep);
  letter-spacing: -0.01em;
}
.home-hero-stat-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-3);
  font-weight: 600;
  margin-top: 4px;
}

.eco-cards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  margin-bottom: 40px;
}
@media (max-width: 900px) { .eco-cards-grid { grid-template-columns: 1fr; gap: 20px; } }

.eco-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}
.eco-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--card-color);
}
.eco-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 35px -10px rgba(0,0,0,0.15);
  border-color: var(--card-color);
}
.eco-card-eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--card-color);
  font-weight: 700;
  margin-bottom: 12px;
}
.eco-card-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.015em;
  margin-bottom: 12px;
  line-height: 1.2;
}
.eco-card-tagline {
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.55;
  margin-bottom: 20px;
}
.eco-card-headline {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  font-style: italic;
  color: var(--card-color);
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.eco-card-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.eco-card-stat-value {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1.1;
  margin-bottom: 4px;
}
.eco-card-stat-label {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}
.eco-card-stat-sub {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
  font-style: italic;
}
.eco-card-thesis {
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--text-2);
  margin-bottom: 22px;
}
.eco-card-tickers {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 22px;
}
.eco-card-ticker {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.eco-card-ticker:hover {
  background: var(--card-color);
  color: white;
  border-color: var(--card-color);
}
.eco-card-cta {
  width: 100%;
  background: var(--card-color);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 13px 18px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.eco-card-cta:hover { filter: brightness(1.1); transform: translateY(-1px); }
.eco-card-cta-arrow { margin-left: 6px; transition: transform 0.15s; display: inline-block; }
.eco-card-cta:hover .eco-card-cta-arrow { transform: translateX(3px); }

.eco-card.optical { --card-color: #d97706; }
.eco-card.semicap { --card-color: #1e40af; }

.home-tools-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-top: 24px;
}
@media (max-width: 700px) { .home-tools-row { grid-template-columns: 1fr; } }
.home-tool-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.15s;
}
.home-tool-card:hover { border-color: var(--text-3); transform: translateY(-2px); }
.home-tool-icon { font-size: 24px; margin-bottom: 8px; color: var(--accent-deep); }
.home-tool-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.home-tool-desc { font-size: 12px; color: var(--text-3); line-height: 1.5; }

/* ============ ECOSYSTEM MAP (network viz) ============ */
.eco-map-wrap {
  background: linear-gradient(135deg, #fefdfa 0%, #faf9f4 100%);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.eco-map-wrap svg {
  display: block;
  width: 100%;
  height: auto;
  cursor: default;
}
.eco-node {
  cursor: pointer;
  transition: filter 0.15s ease, transform 0.15s ease;
  transform-origin: center;
  transform-box: fill-box;
}
.eco-node:hover {
  filter: drop-shadow(0 4px 14px rgba(217, 119, 6, 0.35));
}
.eco-node circle {
  transition: stroke-width 0.15s ease;
}
.eco-node:hover circle {
  stroke-width: 3 !important;
}
.eco-node.dimmed { opacity: 0.25; }
.eco-link { transition: opacity 0.2s ease, stroke-width 0.2s ease; }
.eco-link.dimmed { opacity: 0.08; }
.eco-link.highlighted { stroke-width: 2.5 !important; opacity: 1; }
.eco-tier-band-text {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  fill: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.eco-node-name {
  font-family: var(--sans);
  font-weight: 700;
  fill: var(--text);
  text-anchor: middle;
  pointer-events: none;
}
.eco-node-meta {
  font-family: var(--sans);
  font-size: 9.5px;
  fill: var(--text-2);
  text-anchor: middle;
  pointer-events: none;
}
.eco-detail-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px 24px;
  margin-top: 18px;
  min-height: 110px;
}
.eco-detail-card.empty {
  background: var(--bg-soft);
  text-align: center;
  color: var(--text-3);
  font-size: 13px;
  padding: 28px 24px;
  font-style: italic;
}
.eco-detail-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  color: var(--text);
}
.eco-detail-tier {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 14px;
}
.eco-detail-body {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-2);
  margin-bottom: 12px;
}
.eco-detail-stats {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  padding-top: 12px;
  border-top: 1px solid var(--border-soft);
}
.eco-detail-stat-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
.eco-detail-stat-value { font-size: 15px; font-weight: 600; color: var(--text); margin-top: 2px; font-variant-numeric: tabular-nums; }
.eco-detail-cta {
  display: inline-block;
  background: var(--accent);
  color: white;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  margin-top: 12px;
  font-family: inherit;
  transition: background 0.15s;
}
.eco-detail-cta:hover { background: var(--accent-deep); }
.eco-legend {
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  padding: 12px 18px;
  border-top: 1px solid var(--border-soft);
  background: var(--bg-soft);
  font-size: 12px;
  color: var(--text-2);
}
.eco-legend-item { display: flex; align-items: center; gap: 6px; }
.eco-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.eco-hint {
  position: absolute;
  top: 14px;
  right: 18px;
  font-size: 11px;
  color: var(--text-3);
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(4px);
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--border-soft);
  pointer-events: none;
}

/* ============ FOOTER ============ */
.footer { margin-top: 48px; padding: 20px 0 0; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-3); line-height: 1.6; }
.footer p { color: var(--text-3); margin-bottom: 4px; }

/* ============ TICKER LINK STYLING ============ */
.tk { color: var(--accent-deep); font-weight: 600; cursor: pointer; padding: 1px 4px; border-radius: 3px; transition: background 0.1s; }
.tk:hover { background: var(--accent-soft); text-decoration: none; }
</style>

      <div class="brand-text" id="brand-text">AI Investor Dashboard</div>
      <div class="brand-sub" id="brand-sub">Two ecosystems · 13 names</div>
    </div>
  </button>

  <div class="ecosystem-switcher" id="ecosystem-switcher">

  </button>

<div class="app">

    <nav id="nav-container"></nav>

const COLOR = {
  accent: '#d97706', accentDeep: '#92400e', accentSoft: '#fef3e2',
  blue: '#1e40af', blueSoft: '#e0e7ff',
  green: '#15803d', greenSoft: '#dcfce7',
  red: '#b91c1c', redSoft: '#fee2e2',
  purple: '#6d28d9', purpleSoft: '#ede9fe',
  teal: '#0f766e', tealSoft: '#ccfbf1',
  text: '#1a1a18', text2: '#5a594f', text3: '#8a8780',
  grid: '#f0ede5', border: '#e8e5dd'
};

if (typeof Chart !== 'undefined') {
  Chart.defaults.color = COLOR.text2;
  Chart.defaults.font.family = "-apple-system, 'Inter', 'Segoe UI', sans-serif";
  Chart.defaults.font.size = 11;
  Chart.defaults.borderColor = COLOR.border;
}

const baseOpts = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: '#1a1a18',
      borderColor: COLOR.border,
      borderWidth: 1,
      titleColor: '#fff',
      bodyColor: '#fff',
      padding: 10,
      boxPadding: 4,
      cornerRadius: 6
    }
  }
};

const gridScale = {
  ticks: { color: COLOR.text3, font: { size: 10 } },
  grid: { color: COLOR.grid, drawBorder: false, drawTicks: false },
  border: { display: false }
};


// State
let currentEcosystem = 'optical';   // 'optical' | 'semicap' | null (when on home)
let currentTicker = null;            // null when on home or ecosystem-level views
let currentSection = 'home';         // 'home' | 'thesis' | 'financials' | etc | 'ecosystem-map' | 'cross-comp' | 'trades'
const charts = {};

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatTickerLink(ticker, displayText) {
  if (!ticker || !COMPANIES[ticker]) return escapeHtml(displayText || ticker || '');
  return `<button class="tk" data-jump="${ticker}">${escapeHtml(displayText || ticker)}</button>`;
}

// Get the ecosystem of a given ticker
function getEcosystemOf(ticker) {
  return COMPANIES[ticker] && COMPANIES[ticker].ecosystem;
}

// Navigation helper — go somewhere
function navigateTo({ ecosystem, ticker, section }) {
  if (ecosystem !== undefined) currentEcosystem = ecosystem;
  if (ticker !== undefined) {
    currentTicker = ticker;
    if (ticker && COMPANIES[ticker]) {
      currentEcosystem = COMPANIES[ticker].ecosystem;
    }
  }
  if (section !== undefined) currentSection = section;
  updateHash();
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function updateHash() {
  if (currentSection === 'home') {
    location.hash = '#home';
  } else if (currentTicker) {
    location.hash = `#${currentEcosystem}/${currentTicker}/${currentSection}`;
  } else {
    location.hash = `#${currentEcosystem}/${currentSection}`;
  }
}


// Render quote strip
function renderQuoteStrip() {
  const strip = document.getElementById('quote-strip');
  if (!strip) return;
  if (!currentTicker || !COMPANIES[currentTicker]) {
    strip.innerHTML = '';
    return;
  }
  const c = COMPANIES[currentTicker];
  strip.innerHTML = `
    <div class="quote-cell"><div class="quote-cell-label">Stock</div><div class="quote-cell-value">$${c.quote.price}</div></div>
    <div class="quote-cell"><div class="quote-cell-label">Mkt cap</div><div class="quote-cell-value">$${c.quote.mktCap}B</div></div>
    <div class="quote-cell"><div class="quote-cell-label">1Y</div><div class="quote-cell-value up">${c.quote.change1y}</div></div>
    <div class="quote-cell"><div class="quote-cell-label">Fwd P/E</div><div class="quote-cell-value">${c.quote.fwdPE}×</div></div>
  `;
}


// Render sidebar nav (per-ticker sections)
function renderNav() {
  const container = document.getElementById('nav-container');
  const labelBrief = document.getElementById('nav-label-brief');
  const labelEco = document.getElementById('nav-label-eco');
  const ecoTools = document.getElementById('eco-tools-container');

  // Hide brief nav and ecosystem tools when on home
  if (currentSection === 'home') {
    labelBrief.style.display = 'none';
    container.innerHTML = '';
    labelEco.style.display = 'none';
    ecoTools.style.display = 'none';
  } else {
    labelEco.style.display = '';
    ecoTools.style.display = '';
    if (!currentTicker) {
      // ecosystem-level view: hide brief nav
      labelBrief.style.display = 'none';
      container.innerHTML = '';
    } else {
      labelBrief.style.display = '';
      const c = COMPANIES[currentTicker];
      const isFull = c.isFullProfile;
      const sections = isFull
        ? [
          { id: 'thesis', label: 'Thesis', num: '01' },
          { id: 'financials', label: 'Financials', num: '02' },
          { id: 'valuation', label: 'Valuation + SOTP', num: '03' },
          { id: 'analysts', label: 'Analyst views', num: '04' },
          { id: 'supply', label: 'Supply chain', num: '05' },
          { id: 'customers', label: 'Customers', num: '06' },
          { id: 'risks', label: 'Risks & catalysts', num: '07' }
        ]
        : [
          { id: 'thesis', label: 'Thesis', num: '01' },
          { id: 'financials', label: 'Financials', num: '02' },
          { id: 'valuation', label: 'Valuation', num: '03' },
          { id: 'analysts', label: 'Analyst views', num: '04' },
          { id: 'customers', label: 'Customers', num: '05' }
        ];
      container.innerHTML = sections.map(s =>
        `<button class="nav-link ${currentSection === s.id ? 'active' : ''}" data-section="${s.id}"><span class="nav-num">${s.num}</span>${s.label}</button>`
      ).join('');
    }
  }

  // Highlight Home button if on home
  document.querySelectorAll('.nav-home').forEach(b => b.classList.toggle('active', currentSection === 'home'));

  // Highlight ecosystem-tool nav links
  document.querySelectorAll('#eco-tools-container .nav-link').forEach(b => {
    b.classList.toggle('active', currentSection === b.dataset.section);
  });
}


// Render brand/topbar dynamic state
function renderTopbar() {
  const brandText = document.getElementById('brand-text');
  const brandSub = document.getElementById('brand-sub');
  const switcher = document.getElementById('ecosystem-switcher');
  const updateBtn = document.getElementById('update-prices-btn');
  const updateTs = document.getElementById('update-timestamp');

  if (currentSection === 'home') {
    brandText.textContent = 'AI Investor Dashboard';
    brandSub.textContent = 'Two ecosystems · 13 names';
    switcher.style.display = 'none';
    if (updateBtn) updateBtn.style.display = 'none';
    if (updateTs) updateTs.style.display = 'none';
  } else {
    const eco = ECOSYSTEMS[currentEcosystem];
    brandText.textContent = eco.name;
    brandSub.textContent = eco.tagline.split(',').slice(0, 1).join(',').replace(/\.$/, '') + '…';
    switcher.style.display = '';
    if (updateBtn) updateBtn.style.display = '';
    if (updateTs) updateTs.style.display = '';
  }

  // ecosystem tabs
  document.querySelectorAll('.eco-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.eco === currentEcosystem && currentSection !== 'home');
  });
}


// Render ticker pills based on current ecosystem
function renderTickerPills() {
  const pillsContainer = document.getElementById('ticker-pills');
  if (currentSection === 'home') {
    pillsContainer.style.display = 'none';
    return;
  }
  pillsContainer.style.display = '';
  const eco = ECOSYSTEMS[currentEcosystem];
  const tickers = eco.tickers;
  pillsContainer.innerHTML = tickers.map(tk => {
    const c = COMPANIES[tk];
    const ecoCls = currentEcosystem === 'semicap' ? 'eco-semicap' : '';
    const activeCls = tk === currentTicker ? `active ${ecoCls}` : '';
    const shortName = c.name.split(' ')[0];
    return `<button class="ticker-pill ${activeCls}" data-ticker="${tk}">${tk}<span class="pill-name">${escapeHtml(shortName)}</span></button>`;
  }).join('');
}


// Main render dispatcher
function render() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  Object.keys(charts).forEach(k => delete charts[k]);

  renderTopbar();
  renderTickerPills();
  renderQuoteStrip();
  renderNav();

  const main = document.getElementById('main-content');

  // Home view
  if (currentSection === 'home') {
    main.innerHTML = renderHome();
    afterRender();
    return;
  }

  // Ecosystem-level sections (work for all tickers)
  if (currentSection === 'ecosystem-map') { main.innerHTML = renderEcosystemMap(currentEcosystem); afterRender(); return; }
  if (currentSection === 'cross-comp') { main.innerHTML = renderCrossComp(currentEcosystem); afterRender(); return; }
  if (currentSection === 'trades') { main.innerHTML = renderTrades(currentEcosystem); afterRender(); return; }

  // Per-company sections
  const c = COMPANIES[currentTicker];
  if (!c) {
    // No ticker selected — default to first ticker in ecosystem
    currentTicker = ECOSYSTEMS[currentEcosystem].tickers[0];
    return render();
  }

  switch (currentSection) {
    case 'thesis': main.innerHTML = renderThesis(c); break;
    case 'financials': main.innerHTML = renderFinancials(c); break;
    case 'valuation': main.innerHTML = renderValuation(c); break;
    case 'analysts': main.innerHTML = renderAnalysts(c); break;
    case 'supply': main.innerHTML = renderSupply(c); break;
    case 'customers': main.innerHTML = renderCustomers(c); break;
    case 'risks': main.innerHTML = renderRisks(c); break;
    default: main.innerHTML = renderThesis(c);
  }

  afterRender();
}

function afterRender() {
  // Wire up internal links + nav
  document.querySelectorAll('[data-jump]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const tk = el.dataset.jump;
      if (COMPANIES[tk]) {
        navigateTo({ ticker: tk, section: 'thesis' });
      }
    });
  });
  document.querySelectorAll('.nav-link[data-section]').forEach(btn => {
    btn.addEventListener('click', () => {
      const sec = btn.dataset.section;
      if (sec === 'home') {
        navigateTo({ section: 'home' });
      } else if (['ecosystem-map', 'cross-comp', 'trades'].includes(sec)) {
        navigateTo({ ticker: null, section: sec });
      } else {
        navigateTo({ section: sec });
      }
    });
  });
  document.querySelectorAll('.ticker-pill').forEach(p => {
    p.addEventListener('click', () => {
      navigateTo({ ticker: p.dataset.ticker, section: 'thesis' });
    });
  });

  // Trigger any deferred chart draws
  if (window.__chartDrawers) window.__chartDrawers.forEach(fn => fn());
  window.__chartDrawers = [];

  // Wire up SOTP inputs
  wireSotpInputs();

  // Wire up flow detail panel
  wireFlowDetails();

  // Wire up ecosystem map (only present on the ecosystem-map view)
  wireEcoMap();

  // Wire home page interactions
  wireHomePage();
}

function wireSotpInputs() {
  const inputs = document.querySelectorAll('.sotp-input');
  if (inputs.length === 0) return;
  const c = COMPANIES[currentTicker];
  if (!c.valuation || !c.valuation.sotp) return;

  function recompute() {
    const segments = c.valuation.sotp.map(seg => {
      const rev = parseFloat(document.querySelector(`[data-field="revenue"][data-segment="${seg.id}"]`).value) || 0;
      const margin = parseFloat(document.querySelector(`[data-field="margin"][data-segment="${seg.id}"]`).value) || 0;
      const mult = parseFloat(document.querySelector(`[data-field="multiple"][data-segment="${seg.id}"]`).value) || 0;
      const ev = rev * mult / 1000;
      const cell = document.querySelector(`[data-result-segment="${seg.id}"]`);
      if (cell) cell.textContent = '$' + ev.toFixed(2) + 'B';
      return { name: seg.name, rev, margin, mult, ev };
    });
    const totalEV = segments.reduce((sum, s) => sum + s.ev, 0);
    const netCash = c.quote.mktCap - c.quote.ev; // positive if has cash
    const equity = totalEV + netCash;
    const sharesOut = c.quote.mktCap / c.quote.price; // billions of shares
    const fairValue = equity / sharesOut;
    const upside = ((fairValue / c.quote.price) - 1) * 100;
    const upsideClass = upside >= 0 ? 'up' : 'down';

    const resultEl = document.getElementById('sotp-result');
    if (resultEl) {
      resultEl.innerHTML = `
        ${segments.map(s => `<div class="sotp-result-row"><span>${escapeHtml(s.name)}</span><span>$${s.ev.toFixed(2)}B</span></div>`).join('')}
        <div class="sotp-result-row divider"><span>Sum of segments (Enterprise Value)</span><span>$${totalEV.toFixed(2)}B</span></div>
        <div class="sotp-result-row"><span>± Net cash / (debt)</span><span>$${netCash.toFixed(2)}B</span></div>
        <div class="sotp-result-row"><span>Implied equity value</span><span>$${equity.toFixed(2)}B</span></div>
        <div class="sotp-result-row total"><span>SOTP fair value per share</span><span>$${fairValue.toFixed(0)} <span style="font-size:13px;font-weight:500;color:${upside>=0?'var(--green)':'var(--red)'};">(${upside>=0?'+':''}${upside.toFixed(0)}% vs current)</span></span></div>
      `;
    }
  }

  inputs.forEach(inp => inp.addEventListener('input', recompute));
  recompute();
}


function renderAnalysts(c) {
  const a = c.analysts;
  const buyPct = (a.consensus.buy / a.consensus.count) * 100;
  const holdPct = (a.consensus.hold / a.consensus.count) * 100;
  const sellPct = (a.consensus.sell / a.consensus.count) * 100;
  const upsidePct = ((a.priceTarget.median / a.priceTarget.currentPrice) - 1) * 100;
  const upsideClass = upsidePct >= 0 ? 'up' : 'down';

  // Calculate scale for price target chart
  const targets = a.topTargets || [];
  const minTarget = Math.min(...targets.map(t => t.target), a.priceTarget.currentPrice);
  const maxTarget = Math.max(...targets.map(t => t.target), a.priceTarget.currentPrice);
  const range = maxTarget - minTarget;

  const targetRowsHtml = targets.map(t => {
    const pos = ((t.target - minTarget) / range) * 100;
    const ratingClass = t.rating.toLowerCase().includes('buy') ? 'badge-success' :
                        t.rating.toLowerCase().includes('sell') ? 'badge-danger' : 'badge-neutral';
    return `<div class="target-row">

      <div class="target-rating"><span class="badge ${ratingClass}">${escapeHtml(t.rating)}</span></div>

              <div style="margin-top:6px; font-size:12px;">Median PT: <strong>$${a.priceTarget.median}</strong> (${upsidePct>=0?'+':''}${upsidePct.toFixed(0)}% vs current)</div>

function wireFlowDetails() {
  const nodes = document.querySelectorAll('.clickable-node[data-flow]');
  nodes.forEach(node => {
    node.addEventListener('click', () => {
      const flowId = node.dataset.flow;
      const detail = FLOW_DETAILS[flowId];
      if (!detail) return;
      const panel = document.getElementById('flow-detail');
      if (panel) {
        panel.classList.add('active');
        panel.innerHTML = `
          <div class="flow-detail-title">${detail.title}</div>
          <div class="flow-detail-body">${detail.body}</div>
        `;
        // Wire up any new ticker links inside the panel
        panel.querySelectorAll('[data-jump]').forEach(el => {
          el.addEventListener('click', () => {
            const tk = el.dataset.jump;
            if (COMPANIES[tk]) {
              currentTicker = tk;
              currentSection = 'thesis';
              location.hash = `#${tk}/thesis`;
              render();
            }
          });
        });
      }
    });
  });
}

function renderEcosystemMap(ecoId) {
  const data = ECO_MAP_DATA[ecoId];
  if (!data) return '<section class="section active"><p>Map data not found.</p></section>';

  // Curved bezier path between two points
  function curve(x1, y1, x2, y2) {
    const dx = x2 - x1;
    const cx1 = x1 + dx * 0.55;
    const cx2 = x2 - dx * 0.55;
    return `M ${x1} ${y1} C ${cx1} ${y1}, ${cx2} ${y2}, ${x2} ${y2}`;
  }

  function nodeById(id) { return data.nodes.find(n => n.id === id); }

  // Build links svg
  const linksHtml = data.links.map((l, i) => {
    const a = nodeById(l.s), b = nodeById(l.t);
    if (!a || !b) return '';
    const path = curve(a.x + a.r - 2, a.y, b.x - b.r + 2, b.y);
    const sw = l.w === 3 ? 2.2 : l.w === 2 ? 1.4 : 0.9;
    const opacity = l.highlight ? 0.85 : (l.w === 3 ? 0.55 : l.w === 2 ? 0.4 : 0.25);
    const strokeColor = l.highlight ? (ecoId === 'optical' ? '#d97706' : '#1e40af') : '#8a8780';
    return `<path class="eco-link" data-link-id="${i}" data-source="${l.s}" data-target="${l.t}" d="${path}" stroke="${strokeColor}" stroke-width="${sw}" fill="none" opacity="${opacity}" />`;
  }).join('');

  // Build nodes svg
  const nodesHtml = data.nodes.map(n => {
    const fillOpacity = n.accent ? 1 : 0.92;
    return `
      <g class="eco-node" data-node-id="${n.id}" ${n.clickable ? `data-clickable="${n.clickable}"` : ''}>
        ${n.accent ? `<circle cx="${n.x}" cy="${n.y}" r="${n.r + 6}" fill="${n.color}" opacity="0.12"/>` : ''}
        <circle cx="${n.x}" cy="${n.y}" r="${n.r}" fill="${n.color}" stroke="white" stroke-width="2" opacity="${fillOpacity}"/>
        <text class="eco-node-name" x="${n.x}" y="${n.y + n.r + 16}" font-size="${n.r > 30 ? 13 : 12}">${escapeHtml(n.name)}</text>
        <text class="eco-node-meta" x="${n.x}" y="${n.y + n.r + 30}">${escapeHtml(n.sub)}</text>
      </g>
    `;
  }).join('');

  const bandsHtml = data.tiers.map(b =>
    `<text class="eco-tier-band-text" x="${b.x}" y="35" text-anchor="middle">${escapeHtml(b.label)}</text>`
  ).join('');

  const legendHtml = data.legend.map(l =>
    `<div class="eco-legend-item"><span class="eco-legend-dot" style="background:${l.color}"></span>${escapeHtml(l.label)}</div>`
  ).join('');

  // Path narratives below the map
  const pathsBlock = ecoId === 'optical' ? `
    <h2 class="subsection-title">The two value chains that matter</h2>
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><div class="card-title" style="color: var(--accent-deep);">Path 1 · The hyperscaler chain</div></div>
        <p style="font-size:13px;line-height:1.6;color:var(--text-2);">A hyperscaler orders 1.6T networking switches from <strong>${formatTickerLink('CLS','Celestica')}</strong>. CLS builds them using switch chips from <strong>Broadcom</strong>, DSPs from <strong>Marvell</strong>, and laser chips from <strong>${formatTickerLink('LITE','Lumentum')}</strong>. The optical assemblies are physically built by <strong>${formatTickerLink('FN','Fabrinet')}</strong>. Connectors and power cables come from <strong>${formatTickerLink('APH','Amphenol')}</strong>. The fiber linking the racks is <strong>${formatTickerLink('GLW','Corning')}</strong>.</p>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title" style="color: var(--accent-deep);">Path 2 · The NVIDIA chain</div></div>
        <p style="font-size:13px;line-height:1.6;color:var(--text-2);">NVIDIA builds its own switches (Spectrum-X, Quantum-X) using sole-sourced UHP CW lasers from <strong>${formatTickerLink('LITE','Lumentum')}</strong> for co-packaged optics, secondary lasers from <strong>${formatTickerLink('COHR','Coherent')}</strong>, and assemblies from <strong>${formatTickerLink('FN','Fabrinet')}</strong> (~30% of FN revenue). NVIDIA invested $2B in Lumentum preferred to lock in supply.</p>
      </div>
    </div>
  ` : `
    <h2 class="subsection-title">The two value chains that matter</h2>
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><div class="card-title" style="color: var(--blue);">Path 1 · The TSMC logic chain</div></div>
        <p style="font-size:13px;line-height:1.6;color:var(--text-2);">NVIDIA designs a Blackwell GPU. TSMC fabs it using <strong>${formatTickerLink('AMAT','Applied Materials')}</strong> deposition tools, <strong>${formatTickerLink('LRCX','Lam Research')}</strong> etch tools, ASML EUV lithography, photomasks from <strong>${formatTickerLink('PLAB','Photronics')}</strong>, and yield is verified by <strong>${formatTickerLink('KLAC','KLA')}</strong> inspection at every step. Q1 2026 TSMC revenue: $36B with HPC at 61% — that\'s where the AI capex flows.</p>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title" style="color: var(--blue);">Path 2 · The HBM memory chain</div></div>
        <p style="font-size:13px;line-height:1.6;color:var(--text-2);">SK Hynix manufactures HBM3E/HBM4 stacks for NVIDIA. Memory production uses heavy LRCX etch + dep, AMAT tools, and <strong>${formatTickerLink('ACLS','Axcelis')}</strong> ion implanters. The 2.5D packaging that connects HBM to GPU dies is inspected by <strong>${formatTickerLink('ONTO','Onto Innovation')}</strong>\'s Dragonfly platform — just qualified at TSMC in April 2026. <strong>${formatTickerLink('KLAC','KLA')}</strong> handles general inspection.</p>
      </div>
    </div>
  `;

  return `
    <section class="section active">
      <div class="section-header">
        <div class="eyebrow">★ Ecosystem map</div>
        <h1 class="page-title">${escapeHtml(data.title)}</h1>
        <p class="lead-paragraph">${data.lead}</p>
      </div>

      <div class="eco-map-wrap">
        <div class="eco-hint">Hover • click bold names</div>
        <svg viewBox="0 0 970 480" xmlns="http://www.w3.org/2000/svg" id="eco-svg" data-eco="${ecoId}">
          ${bandsHtml}
          <line x1="80" y1="48" x2="880" y2="48" stroke="#e8e5dd" stroke-width="1" stroke-dasharray="2 4"/>
          <g id="eco-links">${linksHtml}</g>
          <g id="eco-nodes">${nodesHtml}</g>
        </svg>
        <div class="eco-legend">
          ${legendHtml}
          <div class="eco-legend-item" style="margin-left:auto"><span style="display:inline-block;width:18px;height:2.5px;background:${ecoId === 'optical' ? '#d97706' : '#1e40af'};margin-right:6px;vertical-align:middle"></span>Strategic relationship</div>
        </div>
      </div>

      <div class="eco-detail-card empty" id="eco-detail">Hover or click a company to see what they do and who they connect to.</div>

      ${pathsBlock}

      <h2 class="subsection-title">Ecosystem at a glance</h2>
      ${renderEcosystemTable(ecoId)}
    </section>
  `;
}


function wireEcoMap() {
  const svg = document.getElementById('eco-svg');
  if (!svg) return;
  const ecoId = svg.dataset.eco;
  const data = ECO_MAP_DATA[ecoId];
  if (!data) return;

  const detailEl = document.getElementById('eco-detail');
  const nodes = svg.querySelectorAll('.eco-node');
  const links = svg.querySelectorAll('.eco-link');

  function showDetail(nodeId) {
    const d = data.nodeDetails[nodeId];
    const node = Array.from(nodes).find(n => n.dataset.nodeId === nodeId);
    if (!d || !node) return;
    const name = node.querySelector('.eco-node-name').textContent;
    const sub = node.querySelector('.eco-node-meta').textContent;
    const ctaHtml = d.cta ? `<button class="eco-detail-cta" data-jump="${d.cta}">View full profile →</button>` : '';
    detailEl.classList.remove('empty');
    detailEl.innerHTML = `
      <div class="eco-detail-tier">${escapeHtml(d.tier)}</div>
      <div class="eco-detail-title">${escapeHtml(name)}</div>
      <div class="eco-detail-body">${escapeHtml(d.body)}</div>
      <div class="eco-detail-stats">
        <div><div class="eco-detail-stat-label">Position</div><div class="eco-detail-stat-value">${escapeHtml(sub)}</div></div>
        ${ctaHtml}
      </div>
    `;
    const cta = detailEl.querySelector('[data-jump]');
    if (cta) cta.addEventListener('click', () => {
      const tk = cta.dataset.jump;
      if (COMPANIES[tk]) navigateTo({ ticker: tk, section: 'thesis' });
    });
  }

  function highlight(nodeId) {
    const connectedIds = new Set([nodeId]);
    links.forEach(l => {
      if (l.dataset.source === nodeId) connectedIds.add(l.dataset.target);
      if (l.dataset.target === nodeId) connectedIds.add(l.dataset.source);
    });
    nodes.forEach(n => n.classList.toggle('dimmed', !connectedIds.has(n.dataset.nodeId)));
    links.forEach(l => {
      const isConnected = l.dataset.source === nodeId || l.dataset.target === nodeId;
      l.classList.toggle('highlighted', isConnected);
      l.classList.toggle('dimmed', !isConnected);
    });
  }

  function clearHighlight() {
    nodes.forEach(n => n.classList.remove('dimmed'));
    links.forEach(l => { l.classList.remove('highlighted'); l.classList.remove('dimmed'); });
  }

  nodes.forEach(node => {
    node.addEventListener('mouseenter', () => {
      highlight(node.dataset.nodeId);
      showDetail(node.dataset.nodeId);
    });
    node.addEventListener('click', () => {
      const cta = node.dataset.clickable;
      if (cta && COMPANIES[cta]) {
        navigateTo({ ticker: cta, section: 'thesis' });
      } else {
        showDetail(node.dataset.nodeId);
      }
    });
  });
  svg.addEventListener('mouseleave', clearHighlight);
}

// Try multiple data sources with fallback. Stooq CSV has friendly CORS.
async function fetchPrice(ticker) {
  // Stooq uses lowercase ticker + .us suffix for US stocks
  const url = `https://stooq.com/q/l/?s=${ticker.toLowerCase()}.us&f=sd2t2ohlcv&h&e=csv`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    // CSV format: Symbol,Date,Time,Open,High,Low,Close,Volume
    // We want the Close (index 6)
    const lines = text.trim().split('\n');
    if (lines.length < 2) throw new Error('No data');
    const cols = lines[1].split(',');
    if (cols.length < 7) throw new Error('Bad CSV format');
    const close = parseFloat(cols[6]);
    if (isNaN(close) || close <= 0) throw new Error('Invalid close price');
    return close;
  } catch (err) {
    return null;
  }
}

async function updateAllPrices() {
  const btn = document.getElementById('update-prices-btn');
  const tsEl = document.getElementById('update-timestamp');
  const labelEl = btn.querySelector('.update-label');

  btn.classList.remove('success', 'error');
  btn.classList.add('loading');
  btn.disabled = true;
  labelEl.textContent = 'Fetching…';
  tsEl.textContent = '';

  const tickers = Object.keys(COMPANIES);
  const results = await Promise.all(tickers.map(async tk => {
    const price = await fetchPrice(tk);
    return { ticker: tk, price };
  }));

  const succeeded = results.filter(r => r.price !== null);
  const failed = results.filter(r => r.price === null);

  // Update in-memory data
  succeeded.forEach(r => {
    const c = COMPANIES[r.ticker];
    if (c && c.quote) {
      const oldPrice = c.quote.price;
      c.quote.price = r.price;

      // Recompute "Stock vs median PT" hero stat if it exists
      if (c.thesis && c.thesis.heroStats && c.analysts && c.analysts.priceTarget) {
        const median = c.analysts.priceTarget.median;
        const pct = ((r.price - median) / median) * 100;
        c.analysts.priceTarget.currentPrice = r.price;
        c.analysts.priceTarget.vsCurrent = (pct >= 0 ? '+' : '') + pct.toFixed(0) + '%';

        // Find and update the hero stat that compares to PT
        const heroStat = c.thesis.heroStats.find(s => {
          if (!s.label) return false;
          const lbl = s.label.toLowerCase();
          return lbl.includes('vs median') || lbl.includes('vs street') || lbl.includes('median pt');
        });
        if (heroStat) {
          const heroPct = ((r.price - median) / median) * 100;
          heroStat.value = (heroPct >= 0 ? '+' : '') + heroPct.toFixed(0) + '%';
          heroStat.subClass = heroPct > 0 ? 'down' : 'up';  // above PT = bearish framing
          heroStat.sub = `Trading ${heroPct >= 0 ? 'above' : 'below'} median target of $${median}`;
        }
      }

      // Recompute analyst topTargets vs %
      if (c.analysts && c.analysts.topTargets) {
        c.analysts.topTargets.forEach(t => {
          if (typeof t.target === 'number') {
            const pct = ((t.target - r.price) / r.price) * 100;
            t.vs = (pct >= 0 ? '+' : '') + pct.toFixed(0) + '%';
          }
        });
      }
    }
  });

  // UI feedback
  btn.classList.remove('loading');
  btn.disabled = false;

  if (failed.length === 0) {
    btn.classList.add('success');
    labelEl.textContent = `Updated ${succeeded.length}`;
    setTimeout(() => {
      btn.classList.remove('success');
      labelEl.textContent = 'Update prices';
    }, 2500);
  } else if (succeeded.length === 0) {
    btn.classList.add('error');
    labelEl.textContent = 'Update failed';
    setTimeout(() => {
      btn.classList.remove('error');
      labelEl.textContent = 'Update prices';
    }, 4000);
    alert(
      `Couldn't fetch prices.\n\n` +
      `This usually means the data source (Stooq) is blocked by CORS in your browser, or you're offline.\n\n` +
      `If you're opening this file directly (file://), some browsers block external requests. ` +
      `Try opening through a local server, or open this dashboard with the link from claude.ai which serves it from a hosted URL.`
    );
    return;
  } else {
    btn.classList.add('success');
    labelEl.textContent = `${succeeded.length}/${tickers.length} updated`;
    setTimeout(() => {
      btn.classList.remove('success');
      labelEl.textContent = 'Update prices';
    }, 3500);
  }

  // Show timestamp
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  tsEl.textContent = `as of ${hh}:${mm}`;

  // Re-render current view to reflect new prices
  render();
}




let __initialized = false;

function init() {
  // Parse hash — supports formats:
  //  #home
  //  #optical                    (ecosystem default = ecosystem-map)
  //  #optical/LITE               (ticker default = thesis)
  //  #optical/LITE/valuation
  //  #optical/cross-comp
  //  #semicap/AMAT/thesis
  const hash = location.hash.replace('#', '');
  if (!hash || hash === 'home') {
    currentSection = 'home';
    currentTicker = null;
  } else {
    const parts = hash.split('/');
    const first = parts[0];
    if (first === 'optical' || first === 'semicap') {
      currentEcosystem = first;
      const second = parts[1];
      if (!second) {
        currentSection = 'ecosystem-map';
        currentTicker = null;
      } else if (['ecosystem-map', 'cross-comp', 'trades'].includes(second)) {
        currentSection = second;
        currentTicker = null;
      } else if (COMPANIES[second]) {
        currentTicker = second;
        currentSection = parts[2] || 'thesis';
      } else {
        currentSection = 'home';
      }
    } else if (COMPANIES[first]) {
      // Backward compatibility — old format #LITE/thesis
      currentTicker = first;
      currentEcosystem = COMPANIES[first].ecosystem;
      currentSection = parts[1] || 'thesis';
    } else if (['ecosystem-map', 'cross-comp', 'trades'].includes(first)) {
      // Legacy — assume optical
      currentEcosystem = 'optical';
      currentSection = first;
      currentTicker = null;
    } else {
      currentSection = 'home';
    }
  }

  // Wire static handlers ONCE (not on every hashchange)
  if (!__initialized) {
    __initialized = true;

    // Wire ecosystem switcher tabs
    document.querySelectorAll('.eco-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const ecoId = tab.dataset.eco;
        navigateTo({ ecosystem: ecoId, ticker: null, section: 'ecosystem-map' });
      });
    });

    // Wire brand-home button
    const brandHome = document.getElementById('brand-home');
    if (brandHome) {
      brandHome.addEventListener('click', () => navigateTo({ section: 'home' }));
    }

    // Wire update prices button
    const updateBtn = document.getElementById('update-prices-btn');
    if (updateBtn) {
      updateBtn.addEventListener('click', updateAllPrices);
    }
  }

  render();
}

window.addEventListener('hashchange', () => {
  // Only re-init if hash changed externally (back/forward)
  init();
});

init();
</script>
